<!-- May 風 Google Fonts: Noto Serif TC + Cormorant Garamond -->
<!-- 連動 Harbor 5/14 15:42 拍板 B「May 風」 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<!-- v0.9.4 May 風內聯 CSS（取代 may.scss 因 remote_theme 編譯錯）-->
<style>
  /* === 主色覆寫 === */
  :root {
    --may-bg: #fdf6f2;
    --may-sidebar: #f5ede6;
    --may-text: #2d2622;
    --may-heading: #c0796a;
    --may-link: #c0796a;
    --may-border: #e8d9cc;
    --may-code-bg: #f0e7e0;
  }

  /* === Body 背景 + 字體 === */
  body {
    background-color: var(--may-bg) !important;
    color: var(--may-text);
    font-family: "Noto Serif TC", "PingFang TC", "Hiragino Sans CNS", "Microsoft JhengHei", serif !important;
    letter-spacing: 0.02em;
  }

  /* === Sidebar 背景 === */
  .side-bar {
    background-color: var(--may-sidebar) !important;
    border-right: 1px solid var(--may-border) !important;
  }

  /* === 標題（H1-H6）暖磚紅 + Cormorant Garamond === */
  h1, h2, h3, h4, h5, h6 {
    font-family: "Cormorant Garamond", "Noto Serif TC", Georgia, serif !important;
    color: var(--may-heading) !important;
    font-weight: 600;
  }

  /* === Site title === */
  .site-title, .site-title a {
    font-family: "Cormorant Garamond", "Noto Serif TC", Georgia, serif !important;
    color: var(--may-heading) !important;
  }

  /* === 連結色 === */
  a, .main a:not(.btn) {
    color: var(--may-link);
  }

  /* === Sidebar nav-list 樣式 === */
  .nav-list .nav-list-item .nav-list-link:hover {
    background-color: rgba(192, 121, 106, 0.08) !important;
  }

  .nav-list .nav-list-item .nav-list-link.active {
    background-color: rgba(192, 121, 106, 0.15) !important;
    color: var(--may-heading) !important;
    font-weight: 600;
  }

  /* === Code 區塊 === */
  code {
    background-color: var(--may-code-bg) !important;
    color: var(--may-text) !important;
  }

  /* === aux-nav 頂部連結 === */
  .aux-nav-list-item a {
    color: var(--may-link) !important;
  }

  /* === 表格 === */
  th {
    background-color: var(--may-sidebar) !important;
    color: var(--may-heading) !important;
  }

  /* === v0.9.5 新增：頂部 search/aux 白色區塊區隔 === */
  .main-header {
    background-color: #ffffff !important;
    border-bottom: 1px solid var(--may-border) !important;
  }

  /* search input 框 */
  .search-input-wrap {
    background-color: #ffffff !important;
    border: 1px solid var(--may-border);
    border-radius: 4px;
  }

  /* === v0.9.5 新增：Hero 區（H1 + 副標 + badges）漸層暖色背景 === */
  .hero {
    background: linear-gradient(135deg, #fdf6f2 0%, #ede0d4 100%);
    padding: 3rem 2.5rem 2rem;
    margin: -2rem -2rem 2rem;
    border-bottom: 3px solid var(--may-heading);
    text-align: center;
    border-radius: 0 0 8px 8px;
  }

  .hero h1 {
    margin-top: 0;
    font-size: 3rem;
    letter-spacing: 0.05em;
  }

  .hero blockquote {
    border-left: none;
    padding: 0.5rem 1rem;
    margin: 1rem 0;
    background: transparent;
    font-style: italic;
    color: #5a4a40;
    font-size: 1.1rem;
  }

  .hero p {
    margin: 0.5rem 0;
  }
</style>

<!-- v0.9.5 Hero 區 JS 包裝：把 main-content 開頭 h1 + 後續 ~ hr 包進 .hero -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const main = document.querySelector('.main-content');
  if (!main) return;
  const h1 = main.querySelector(':scope > h1:first-of-type');
  if (!h1) return;

  // 只在首頁應用（h1 是「暖流人心」開頭）
  if (!h1.textContent.includes('暖流人心')) return;

  const hero = document.createElement('div');
  hero.className = 'hero';
  main.insertBefore(hero, h1);

  let next = h1;
  while (next) {
    const after = next.nextElementSibling;
    hero.appendChild(next);
    if (next.tagName === 'HR') break;
    next = after;
  }
});
</script>
