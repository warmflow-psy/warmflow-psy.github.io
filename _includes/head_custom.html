<!-- v0.9.4 May 風內聯 CSS（取代 may.scss 因 remote_theme 編譯錯）-->
<style>
  /* === 主色覆寫 === */
  :root {
    --may-bg: #fdf6f2;
    --may-sidebar: #f5ede6;
    --may-text: #2d2622;
    --may-heading: #c0796a;
    --may-link: #c0796a;
    --may-border: #e8d9cc;
    --may-code-bg: #f0e7e0;
  }

  /* === Body 背景 + 字體 === */
  body {
    background-color: var(--may-bg) !important;
    color: var(--may-text);
    font-family: "Noto Serif TC", "PingFang TC", "Hiragino Sans CNS", "Microsoft JhengHei", serif !important;
    letter-spacing: 0.02em;
  }

  /* === Sidebar 背景 === */
  .side-bar {
    background-color: var(--may-sidebar) !important;
    border-right: 1px solid var(--may-border) !important;
  }

  /* === 標題（H1-H6）暖磚紅 + Cormorant Garamond === */
  h1, h2, h3, h4, h5, h6 {
    font-family: "Cormorant Garamond", "Noto Serif TC", Georgia, serif !important;
    color: var(--may-heading) !important;
    font-weight: 600;
  }

  /* === Site title === */
  .site-title, .site-title a {
    font-family: "Cormorant Garamond", "Noto Serif TC", Georgia, serif !important;
    color: var(--may-heading) !important;
  }

  /* === 連結色 === */
  a, .main a:not(.btn) {
    color: var(--may-link);
  }

  /* === Sidebar nav-list 樣式 === */
  .nav-list .nav-list-item .nav-list-link:hover {
    background-color: rgba(192, 121, 106, 0.08) !important;
  }

  .nav-list .nav-list-item .nav-list-link.active {
    background-color: rgba(192, 121, 106, 0.15) !important;
    color: var(--may-heading) !important;
    font-weight: 600;
  }

  /* === Code 區塊 === */
  code {
    background-color: var(--may-code-bg) !important;
    color: var(--may-text) !important;
  }

  /* === aux-nav 頂部連結 === */
  .aux-nav-list-item a {
    color: var(--may-link) !important;
  }

  /* === 表格 === */
  th {
    background-color: var(--may-sidebar) !important;
    color: var(--may-heading) !important;
  }

  /* === v0.9.5 新增：頂部 search/aux 白色區塊區隔 === */
  .main-header {
    background-color: #ffffff !important;
    border-bottom: 1px solid var(--may-border) !important;
  }

  /* search input 框 */
  .search-input-wrap {
    background-color: #ffffff !important;
    border: 1px solid var(--may-border);
    border-radius: 4px;
  }

  /* === v0.9.6 強化：Hero 區大對比視覺重點 === */
  .hero {
    background: linear-gradient(135deg, #f8d5c2 0%, #fdf6f2 60%, #ede0d4 100%) !important;
    padding: 4rem 2.5rem 3rem !important;
    margin: -1.5rem -1.5rem 3rem !important;
    border-bottom: 6px solid var(--may-heading) !important;
    border-radius: 0 0 12px 12px !important;
    text-align: center !important;
    box-shadow: 0 4px 12px rgba(192, 121, 106, 0.15) !important;
    position: relative !important;
  }

  /* Hero 上方裝飾條 */
  .hero::before {
    content: "";
    display: block;
    width: 60px;
    height: 4px;
    background: var(--may-heading);
    margin: 0 auto 1.5rem;
    border-radius: 2px;
  }

  .hero h1,
  .hero .hero-title {
    margin-top: 0 !important;
    margin-bottom: 1rem !important;
    font-size: 3.5rem !important;
    letter-spacing: 0.08em !important;
    line-height: 1.2 !important;
    color: var(--may-heading) !important;
  }

  .hero blockquote,
  .hero .hero-subtitle {
    border-left: none !important;
    padding: 0.8rem 2rem !important;
    margin: 1.5rem auto !important;
    max-width: 700px !important;
    background: rgba(255, 255, 255, 0.4) !important;
    font-style: italic !important;
    color: #5a4a40 !important;
    font-size: 1.15rem !important;
    border-radius: 8px !important;
    line-height: 1.7 !important;
  }

  .hero p {
    margin: 0.5rem 0 !important;
  }

  .hero p img {
    margin: 0.25rem;
    vertical-align: middle;
  }
</style>
